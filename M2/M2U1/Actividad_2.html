<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>M2U1_Actividad 2</title>
<link rel="stylesheet" href="estilos1.css">
</head>

<body>

    <p>Acá podés escribir:</p>

    <div class="cuadrado" contenteditable="true" >
    </div>

    <p><br>Cantidad de caracteres: <span id="contador">0</span></p>

        <script>

        // CSS
        const cuadrado = document.querySelector('.cuadrado');
        const contador = document.getElementById('contador');

        cuadrado.addEventListener('input', function() {
            contador.textContent = cuadrado.innerText.length;
        });

</script>

</body>
</html>
